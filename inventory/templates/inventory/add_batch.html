{% extends 'base.html' %}

{% block title %}Add Batch{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: auto;">
    <h2>Add New Batch</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1rem;">
            <label>Select Medicine:</label><br>
            <select name="medicine_id" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
                {% for medicine in medicines %}
                <option value="{{ medicine.id }}" {% if request.GET.medicine_id == medicine.id|slugify %}selected{% endif %}>
                    {{ medicine.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Batch Number:</label><br>
            <input type="text" name="batch_number" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Expiry Date:</label><br>
            <input type="date" name="expiry_date" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Quantity:</label><br>
            <input type="number" name="quantity" required min="1" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
        </div>
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
                <label>Cost Price:</label><br>
                <input type="number" step="0.01" name="cost_price" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            </div>
            <div style="flex: 1;">
                <label>MRP:</label><br>
                <input type="number" step="0.01" name="mrp" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            </div>
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Storage Condition:</label><br>
            <select name="storage_condition" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
                <option value="NORMAL">Normal</option>
                <option value="REFRIGERATED">Refrigerated</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Add Batch to Inventory</button>
    </form>
</div>
{% endblock %}
